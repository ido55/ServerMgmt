{% extends "base.html" %}
{% block title %} Index {% endblock %}
{% block content %}
<h1>Home Page</h1>
<ul>
  {% for server in servers %}
    <li>{{ server.name }} <button onclick="deleteServer({{ server.pid }})">Delete</button><a href="{{ url_for('details',pid=server.pid) }}">Details</a></li>
  {% endfor %}
</ul>

<h3>New Server</h3>
<form action="{{ url_for('index') }}" method="post">
  <input type="text" name="name" placeholder="Name" required="required"><br>
  <input type="text" name="os" placeholder="Operating System"><br>
  <input type="text" name="ip" placeholder="IPv4"><br>
  <input type="submit" value="Create"><br>
</form>

<a href="{{ url_for('scripts') }}">View all Scripts</a>

<script type="text/javascript">
  function deleteServer(pid) {
    fetch('{{ url_for("delete",pid=pid) }}' + pid,{
      method: 'DELETE'
    }).then(response => {
      if(response.ok){
        window.location.reload();
      } else{
        console.error('Failed to delete item with pid: ',pid);
      }

    }).catch(error => console.error('Error during fetching:', error));

  }

</script>
{% endblock %}
